<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0E3553">
<title>BSB Schifffahrt – Bodensee</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap">
<script src="i18n.js"></script>
<style>
:root{--ink:#0A2233;--navy:#103A5A;--blue:#15679E;--azure:#2BA6C9;--red:#C8472F;--kat:#7B4FA0;--sky:#EAF2F8;--paper:#F4F8FB;--line:#D8E5EF;--muted:#5C7488;--gold:#B9842B;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased;}
.lg-app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper);}
select,input,button{font-family:inherit;}

.lg-head{position:relative;background:linear-gradient(160deg,#0E3553 0%,#15679E 100%);color:#fff;padding:26px 22px 42px;overflow:hidden;}
.lg-head-inner{position:relative;z-index:2;}
.lg-head-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
.lg-back{display:inline-flex;align-items:center;gap:6px;color:#0A2233;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;background:#7FD5EA;border:1.5px solid #62D0E8;border-radius:999px;padding:9px 16px;-webkit-tap-highlight-color:transparent;transition:.15s;}
.lg-back:hover,.lg-back:active{background:#62D0E8;border-color:#2BA6C9;}
.lg-head h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:38px;line-height:1.02;margin:6px 0 0;letter-spacing:.01em;}
.lg-head h1 .hl{color:#62D0E8;}
.lg-sub{margin:8px 0 0;font-size:14px;color:#D5E6F1;max-width:38ch;}
.lg-lang{display:flex;gap:6px;flex:none;}
.lg-lang button{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;padding:5px 7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.lg-lang button .flag{font-size:16px;line-height:1;}
.lg-lang button .code{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;color:#D5E6F1;}
.lg-lang button.is-on{background:#fff;border-color:#fff;}
.lg-lang button.is-on .code{color:var(--navy);}
.lg-wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:48px;z-index:1;fill:var(--paper);}

.lg-tabs{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
.lg-tabs button{flex:1;border:none;background:none;padding:14px 6px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:.15s;}
.lg-tabs button.is-active{color:var(--blue);border-bottom-color:var(--azure);}

.lg-panel{padding:18px 16px 8px;}
.lg-szw-head{margin:0 0 12px;}
.lg-szw-label{display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:23px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.lg-szw-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.lg-szw-chip{border:2px solid var(--azure);background:#fff;border-radius:999px;padding:11px 18px;font-size:15px;font-weight:600;color:var(--navy);cursor:pointer;transition:.15s;box-shadow:0 1px 2px rgba(16,58,90,.08);}
.lg-szw-chip:hover{background:var(--sky);}
.lg-szw-chip.is-on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(21,103,158,.35);}

.lg-route{display:flex;align-items:flex-end;gap:8px;}
.lg-field{flex:1;display:flex;flex-direction:column;gap:5px;}
.lg-field>span{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:12px;font-weight:600;color:var(--muted);}
.lg-field select,.lg-field input{appearance:none;-webkit-appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:12px;font-size:15px;font-weight:500;color:var(--ink);width:100%;}
.lg-field select:focus,.lg-field input:focus{outline:none;border-color:var(--azure);box-shadow:0 0 0 3px rgba(43,166,201,.18);}
.lg-field-btn{appearance:none;-webkit-appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:12px;font-size:15px;font-weight:500;color:var(--ink);width:100%;font-family:inherit;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;cursor:pointer;}
.lg-field-btn:focus{outline:none;border-color:var(--azure);box-shadow:0 0 0 3px rgba(43,166,201,.18);}
.lg-field-chev{flex:0 0 auto;color:var(--muted);font-size:13px;}
.lg-swap{flex:0 0 auto;width:44px;height:46px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:20px;cursor:pointer;transition:.15s;}
.lg-swap:hover{background:var(--navy);}

.lg-picker-backdrop{position:fixed;inset:0;background:rgba(10,34,51,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.lg-picker-panel{background:#fff;width:100%;max-width:480px;max-height:78vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:14px 16px 22px;box-shadow:0 -4px 24px rgba(16,58,90,.25);}
.lg-picker-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;margin-bottom:8px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;}
.lg-picker-title{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:19px;font-weight:700;color:var(--navy);}
.lg-picker-close{border:none;background:none;font-size:24px;line-height:1;color:var(--muted);padding:4px 8px;cursor:pointer;}
.lg-picker-group{border-radius:12px;padding:9px 9px 5px;margin-top:12px;}
.lg-picker-group:first-of-type{margin-top:4px;}
.lg-picker-group-label{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:14px;font-weight:700;padding:0 5px;margin-bottom:4px;}
.lg-picker-opt{display:block;width:100%;text-align:left;border:none;background:transparent;border-radius:8px;padding:11px 10px;font-size:16px;font-weight:500;color:var(--ink);cursor:pointer;transition:.15s;}
.lg-picker-opt:hover,.lg-picker-opt:active{background:rgba(10,34,51,.08);}
.lg-picker-opt.is-sel{font-weight:700;}

.lg-controls{display:flex;align-items:flex-end;gap:8px;margin-top:12px;}
.lg-field--date{flex:0 0 auto;min-width:160px;}
.lg-daynext{flex:0 0 auto;border:1.5px solid var(--blue);background:var(--blue);color:#fff;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;cursor:pointer;height:46px;white-space:nowrap;transition:.15s;}
.lg-daynext:hover{background:var(--navy);border-color:var(--navy);}
.lg-daynext:active{transform:scale(.98);}
.lg-daynext:disabled{opacity:.4;cursor:default;}

.lg-banner{margin-top:14px;background:#FCEFE9;border:1px solid #EBC3B5;color:#8C3B25;border-radius:10px;padding:11px 13px;font-size:15px;}
.lg-loc-status{margin-top:8px;font-size:15px;color:var(--muted);}

.lg-result-head{display:flex;justify-content:space-between;align-items:baseline;margin:20px 2px 10px;}
.lg-result-route{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--navy);}
.lg-result-route em{color:var(--azure);font-style:normal;margin:0 4px;}
.lg-result-day{font-size:13px;color:var(--muted);font-weight:500;}

.lg-board{display:flex;flex-direction:column;gap:9px;}
.lg-row{position:relative;background:#0E3553;color:#fff;border-radius:12px;padding:13px 40px 13px 15px;cursor:pointer;box-shadow:0 1px 2px rgba(16,58,90,.18);transition:.15s;}
.lg-row:hover{background:#13456C;}
.lg-row.is-open{background:#0B2C46;}
.lg-row-main{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.lg-times{display:flex;align-items:center;gap:10px;}
.lg-clock{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:21px;letter-spacing:.02em;}
.lg-track{display:flex;align-items:center;gap:3px;opacity:.85;}
.lg-dot{width:7px;height:7px;border-radius:50%;background:#62D0E8;}
.lg-dot--end{background:#fff;}
.lg-line{width:13px;height:2px;background:rgba(255,255,255,.4);}
.lg-boat{font-size:12px;line-height:1;}
.lg-meta{display:flex;align-items:center;gap:8px;}
.lg-kurs{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.04em;font-size:14px;background:rgba(255,255,255,.14);padding:3px 9px;border-radius:6px;}
.lg-kurs.sm{font-size:12px;background:var(--sky);color:var(--navy);}
.lg-dur{font-size:12.5px;color:#A9CBDD;font-variant-numeric:tabular-nums;}
.lg-tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.02em;}
.lg-tag--rest{background:#7FE0C4;color:#063B2E;}
.lg-tag--snack{background:#FBE0A6;color:#5C3F08;}
.lg-warn{margin-top:9px;font-size:13px;color:#FFD9CC;background:rgba(200,71,47,.22);border-radius:7px;padding:6px 10px;}
.lg-legs{margin-top:11px;padding-top:11px;border-top:1px dashed rgba(255,255,255,.22);display:flex;flex-direction:column;gap:5px;}
.lg-leg{display:flex;gap:12px;align-items:baseline;font-size:13.5px;}
.lg-leg-t{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#9FD4E6;min-width:46px;}
.lg-leg-n{color:#E8F1F7;}
.lg-chev{position:absolute;right:14px;top:15px;font-size:10px;color:#8FB6CC;}

.lg-empty{text-align:center;padding:34px 20px;background:#fff;border:1px dashed var(--line);border-radius:12px;color:var(--muted);}
.lg-empty-mark{font-size:30px;color:var(--azure);margin-bottom:6px;}
.lg-empty p{margin:4px 0;font-size:14px;}
.lg-empty-hint{font-size:15px;color:var(--muted);}

.lg-trip{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(16,58,90,.07);}
.lg-trip-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:12px;font-weight:700;color:#fff;background:var(--blue);padding:4px 10px;border-radius:6px;}
.lg-trip-badge.alt{background:var(--muted);}
.lg-trip h3{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:700;margin:10px 0 12px;color:var(--navy);}
.lg-trip-leg{margin-bottom:10px;}
.lg-trip-dir{display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:11px;font-weight:600;color:var(--azure);margin-bottom:3px;}
.lg-trip-line,.lg-trip-line2{font-size:14.5px;color:var(--ink);display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.lg-trip-line b,.lg-trip-line2 b{font-family:'IBM Plex Mono',monospace;color:var(--blue);}
.lg-trip-line em,.lg-trip-line2 em{color:var(--azure);font-style:normal;}
.lg-trip-line2{margin-bottom:9px;}
.lg-trip-foot{margin-top:8px;font-size:15px;color:var(--muted);border-top:1px solid var(--line);padding-top:9px;}
.lg-trip--alt{background:#FAFCFD;}

.lg-mini{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.lg-mini h4{font-family:'Barlow Condensed',sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:10px 0 3px;}
.lg-mini h4:first-child{margin-top:0;}
.lg-mini p{margin:0;font-size:15px;}
.lg-mini b{font-family:'IBM Plex Mono',monospace;color:var(--blue);}

.lg-note{font-size:15px;color:#5A4220;background:#FBF4E6;border:1px solid #EBD9B0;border-radius:12px;padding:13px 15px;}
.lg-info{font-size:15px;color:var(--navy);background:var(--sky);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}

.lg-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:13px;}
.lg-card h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--navy);margin:0 0 7px;}
.lg-card p{margin:0;font-size:14px;color:var(--ink);}
.lg-card ul{margin:0;padding-left:18px;font-size:14px;}
.lg-card li{margin-bottom:7px;}
.lg-card--alert{border-left:4px solid var(--red);}
.lg-card-tip{margin-top:9px;font-size:15px;color:var(--muted);}
.lg-muted{color:var(--muted);}
.lg-disclaimer{font-size:15px;color:var(--muted);text-align:center;margin:6px 2px 0;}

.lg-foot{text-align:center;font-size:15px;color:var(--muted);padding:18px 16px 30px;}

@media (max-width:420px){
  .lg-head h1{font-size:32px;}
  .lg-clock{font-size:19px;}
  .lg-controls{flex-wrap:wrap;}
}
.lg-tag--xfer{background:#CFE9F2;color:#0A3A4E;}
.lg-via{margin-top:8px;font-size:13px;color:#A9CBDD;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.lg-via b{color:#fff;font-family:'IBM Plex Mono',monospace;}
.lg-xfer{margin:9px 0 4px;padding:7px 11px;background:rgba(98,208,232,.16);border-radius:8px;font-size:13px;color:#CDEAF4;}
.lg-leg-kurs{display:flex;align-items:center;gap:8px;margin:6px 0 4px;}

.lg-map-wrap{position:relative;background:#A9D4E8;border:1px solid var(--line);border-radius:0;overflow:hidden;margin:0 -16px 10px;touch-action:none;}
.lg-map-wrap svg{display:block;width:100%;height:56vh;max-height:520px;}
.lg-map-wrap.is-vollbild{position:fixed;inset:0;z-index:1000;margin:0;border-radius:0;}
.lg-map-wrap.is-vollbild svg{width:100%;height:100%;max-height:none;}
.lg-map-see{stroke-width:1.1;stroke-linejoin:round;}
.lg-map-see--obersee{fill:#A9D4E8;stroke:#7EB6D9;}
.lg-map-see--ueberlingen{fill:#5FBFCE;stroke:#379AAA;}
.lg-map-see--untersee{fill:#9BDCAE;stroke:#63BB80;}
.lg-map-kontur{fill:none;stroke:var(--navy);stroke-width:1.3;stroke-linejoin:round;opacity:.55;}
.lg-map-grenze{fill:none;stroke:var(--navy);stroke-width:1.1;stroke-dasharray:3,2.4;opacity:.6;}
.lg-map-hafen{fill:#6F97AC;}
.lg-map-hafen--ch{fill:var(--navy);}
.lg-map-hafen-label{font-family:'Inter',sans-serif;font-size:6.5px;fill:var(--navy);paint-order:stroke;stroke:#fff;stroke-width:2px;}
.lg-map-linie{stroke:rgba(255,255,255,.65);stroke-width:1;fill:none;}
.lg-map-schiff{cursor:pointer;}
.lg-map-schiff .lg-map-schiff-rumpf{fill:var(--red);stroke:#fff;stroke-width:.8;stroke-linejoin:round;}
.lg-map-schiff--kat .lg-map-schiff-rumpf{fill:var(--kat);}
.lg-map-schiff.is-sel .lg-map-schiff-rumpf{fill:var(--gold);}
.lg-map-schiff .lg-map-schiff-kabine{fill:#fff;opacity:.9;}
.lg-map-schiff .lg-map-hit{fill:transparent;}
.lg-map-mich{fill:#2B6FE0;stroke:#fff;stroke-width:1;}
.lg-map-mich-halo{fill:rgba(43,111,224,.28);animation:lgPuls 2.2s ease-out infinite;}
@keyframes lgPuls{0%{r:5;opacity:.6;}100%{r:15;opacity:0;}}
.lg-map-locate{position:absolute;top:10px;right:10px;width:38px;height:38px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 6px rgba(16,58,90,.3);font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.lg-map-fs{position:absolute;top:10px;left:10px;width:38px;height:38px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 6px rgba(16,58,90,.3);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.lg-map-hint{font-size:11.5px;color:var(--muted);text-align:center;margin:8px 0;}
.lg-map-stand{font-size:12.5px;color:var(--muted);text-align:center;margin:0 0 14px;}
.lg-map-info{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(255,255,255,.96);border-radius:12px;padding:10px 14px;box-shadow:0 2px 8px rgba(16,58,90,.25);font-size:13px;color:var(--muted);text-align:center;}
.lg-map-info.is-sel{border:1px solid var(--gold);box-shadow:0 0 0 2px rgba(185,132,43,.25),0 2px 8px rgba(16,58,90,.25);}
.lg-map-info b{color:var(--navy);font-size:16px;}
.lg-map-wrap.is-vollbild .lg-map-info{font-size:15px;padding:13px 16px;bottom:max(10px,env(safe-area-inset-bottom));}
.lg-map-wrap.is-vollbild .lg-map-info b{font-size:19px;}
.lg-map-wrap.is-vollbild .lg-map-fs,.lg-map-wrap.is-vollbild .lg-map-locate{top:max(10px,env(safe-area-inset-top));}
</style>
</head>
<body>
<div class="lg-app">
  <header class="lg-head">
    <div class="lg-head-inner">
      <div class="lg-head-top">
        <a class="lg-back" href="./" data-i18n="back_btn">&#8249; Zur&uuml;ck</a>
        <div id="lg-lang-slot"></div>
      </div>
      <h1 id="lg-h1"><span data-i18n="bsb_h1_plain">BSB</span> <span class="hl" data-i18n="bsb_h1_hl">Schifffahrt</span></h1>
      <p class="lg-sub" id="lg-headsub" data-i18n="bsb_season">Saison 2026 · 3. Apr – 18. Okt</p>
    </div>
    <svg class="lg-wave" viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0 30 Q 180 0 360 30 T 720 30 T 1080 30 T 1440 30 V60 H0 Z"/></svg>
  </header>

  <nav class="lg-tabs" id="lg-tabs">
    <button data-tab="planer" data-i18n="tab_verbindung">Verbindung</button>
    <button data-tab="schweiz" data-i18n="tab_schweiz">Schweiz</button>
    <button data-tab="hinweise" data-i18n="tab_hinweise">Hinweise</button>
  </nav>

  <main id="lg-main"></main>
  <footer class="lg-foot" data-i18n="footer_disclaimer">Angaben ohne Gewähr</footer>
</div>

<script src="fahrplan-daten.js"></script>
<script src="katamaran-daten.js"></script>
<script>
"use strict";
var I18N_TITLE_KEY="bsb_doc_title";
document.getElementById("lg-lang-slot").innerHTML=i18nSwitcherHTML();
i18nApplyStatic();
i18nInitSwitcher();

function pad(t){var p=t.split(":");return (p[0].length<2?"0"+p[0]:p[0])+":"+p[1];}
function fmtDur(m){if(m>=60){var h=Math.floor(m/60),r=m%60;return h+t("dur_h_unit")+(r?" "+r+t("dur_min_unit"):"");}return m+t("dur_min_unit");}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function warnText(ex){ return (ex&&ex.warnKey) ? tf(ex.warnKey,ex.warnVals) : null; }


function findConnections(fromIdx,toIdx,date){
  if(fromIdx===toIdx) return [];
  var out=[];
  for(var i=0;i<COURSES.length;i++){
    var c=COURSES[i],pf=-1,pt=-1;
    for(var j=0;j<c.stops.length;j++){if(c.stops[j][0]===fromIdx)pf=j;if(c.stops[j][0]===toIdx)pt=j;}
    if(pf===-1||pt===-1||pf>=pt) continue;
    var ex=exception(c.no,fromIdx,toIdx,date);
    if(ex.removed) continue;
    var dep=c.stops[pf][2],arr=c.stops[pt][1],legs=[];
    for(var k=pf;k<=pt;k++) legs.push({name:PORTS[c.stops[k][0]],t:c.stops[k][1]});
    out.push({no:c.no,svc:c.svc,dep:dep,arr:arr,dur:toMin(arr)-toMin(dep),warn:warnText(ex),legs:legs});
  }
  out.sort(function(a,b){return toMin(a.dep)-toMin(b.dep);});
  return out;
}

var MIN_UMSTIEG=5, MAX_WAIT=180, KNAPP=10;
function legOf(c,fromIdx,toIdx){
  var pf=-1,pt=-1,j;
  for(j=0;j<c.stops.length;j++){if(pf===-1&&c.stops[j][0]===fromIdx)pf=j;}
  for(j=0;j<c.stops.length;j++){if(c.stops[j][0]===toIdx)pt=j;}
  if(pf===-1||pt===-1||pf>=pt) return null;
  var stops=[];
  for(var k=pf;k<=pt;k++){stops.push({name:PORTS[c.stops[k][0]],t:(k===pf?c.stops[k][2]:c.stops[k][1])});}
  return {no:c.no,svc:c.svc,line:c.line,dep:c.stops[pf][2],arr:c.stops[pt][1],stops:stops};
}
function planJourneys(fromIdx,toIdx,dStr){
  if(fromIdx===toIdx) return [];
  var dObj=new Date(dStr+"T12:00:00");
  var valid=[],i;
  for(i=0;i<COURSES.length;i++){ if(courseValidOn(COURSES[i],dObj,dStr)) valid.push(COURSES[i]); }
  var J=[];
  for(i=0;i<valid.length;i++){
    var leg=legOf(valid[i],fromIdx,toIdx);
    if(!leg) continue;
    var ex=exception(leg.no,fromIdx,toIdx,dStr);
    if(ex.removed) continue;
    J.push({dep:leg.dep,arr:leg.arr,dur:toMin(leg.arr)-toMin(leg.dep),transfers:0,via:null,wait:0,xops:false,legs:[leg],warn:warnText(ex)});
  }
  for(i=0;i<valid.length;i++){
    var cA=valid[i],pfA=-1,a;
    for(a=0;a<cA.stops.length;a++){if(cA.stops[a][0]===fromIdx){pfA=a;break;}}
    if(pfA===-1) continue;
    for(var m=0;m<valid.length;m++){
      if(m===i) continue;
      var cB=valid[m],ptB=-1,b;
      for(b=0;b<cB.stops.length;b++){if(cB.stops[b][0]===toIdx)ptB=b;}
      if(ptB===-1) continue;
      for(var h=pfA+1;h<cA.stops.length;h++){
        var hub=cA.stops[h][0];
        if(hub===toIdx) break;
        if(hub===fromIdx) continue;
        var phB=-1,b2;
        for(b2=0;b2<ptB;b2++){if(cB.stops[b2][0]===hub){phB=b2;break;}}
        if(phB===-1) continue;
        var wait=toMin(cB.stops[phB][2])-toMin(cA.stops[h][1]);
        if(wait<MIN_UMSTIEG||wait>MAX_WAIT) continue;
        var legA=legOf(cA,fromIdx,hub),legB=legOf(cB,hub,toIdx);
        if(!legA||!legB) continue;
        var exA=exception(legA.no,fromIdx,hub,dStr),exB=exception(legB.no,hub,toIdx,dStr);
        if(exA.removed||exB.removed) continue;
        var warns=[]; var wA=warnText(exA),wB=warnText(exB); if(wA)warns.push(wA); if(wB)warns.push(wB);
        J.push({dep:legA.dep,arr:legB.arr,dur:toMin(legB.arr)-toMin(legA.dep),transfers:1,via:PORTS[hub],wait:wait,xops:(legA.line!==legB.line),legs:[legA,legB],warn:warns.length?warns.join(" \u00b7 "):null});
      }
    }
  }
  function dominates(K,Q){var kd=toMin(K.dep),qd=toMin(Q.dep),ka=toMin(K.arr),qa=toMin(Q.arr);
    if(kd>=qd&&ka<=qa){ if(kd>qd||ka<qa) return true; if(kd===qd&&ka===qa&&K.transfers<Q.transfers) return true; } return false;}
  var keep=[];
  for(i=0;i<J.length;i++){ var dom=false; for(var p=0;p<J.length;p++){ if(p!==i&&dominates(J[p],J[i])){dom=true;break;} } if(!dom) keep.push(J[i]); }
  var byDep={};
  for(i=0;i<keep.length;i++){
    var key=keep[i].dep,cur=byDep[key];
    if(!cur){ byDep[key]=keep[i]; }
    else{
      var better=(toMin(keep[i].arr)<toMin(cur.arr))||(toMin(keep[i].arr)===toMin(cur.arr)&&keep[i].transfers<cur.transfers);
      if(better) byDep[key]=keep[i];
    }
  }
  var out=[],k; for(k in byDep){ if(byDep.hasOwnProperty(k)) out.push(byDep[k]); }
  out.sort(function(x,y){var dx=toMin(x.dep)-toMin(y.dep); return dx!==0?dx:(toMin(x.arr)-toMin(y.arr));});
  if(out.length>16) out=out.slice(0,16);
  return out;
}

   Berechnet rein aus den vorhandenen Fahrplandaten (Kurszeiten + Hafen-
   koordinaten), welche Kurse gerade jetzt unterwegs sind, und schaetzt die
   Position durch lineare Interpolation zwischen den beiden Haefen, zwischen
   denen sich das Schiff laut Fahrplan gerade befindet. Keine externe
   Ortungsquelle noetig - erfasst nur Kurse, die im Fahrplan stehen. */
function fahrtwinkel(von,nach){
  var a=karteXY(von[0],von[1]),b=karteXY(nach[0],nach[1]);

  var dObj=new Date(dStr+"T12:00:00");
  var nowMinVal=now.getHours()*60+now.getMinutes();
  var out=[];
  for(var i=0;i<COURSES.length;i++){
    var c=COURSES[i];
    if(!courseValidOn(c,dObj,dStr)) continue;
    var stops=c.stops;
    if(stops.length<2) continue;
    for(var s=0;s<stops.length;s++){
      var arrS=toMin(stops[s][1]),depS=toMin(stops[s][2]);
      if(nowMinVal>=arrS&&nowMinVal<=depS){
        var p=COORDS[stops[s][0]];
        var kurs=0;
        if(s<stops.length-1) kurs=fahrtwinkel(p,COORDS[stops[s+1][0]]);
        else if(s>0) kurs=fahrtwinkel(COORDS[stops[s-1][0]],p);
        out.push({no:c.no,svc:c.svc,line:c.line,lat:p[0],lng:p[1],heading:kurs,
          von:PORTS[stops[0][0]],bis:PORTS[stops[stops.length-1][0]],
          status:"liegt in "+PORTS[stops[s][0]]});
        break;
      }
      if(s<stops.length-1){
        var arrNext=toMin(stops[s+1][1]);

          var frac=(nowMinVal-depS)/(arrNext-depS);
          var p1=COORDS[stops[s][0]],p2=COORDS[stops[s+1][0]];
          out.push({no:c.no,svc:c.svc,line:c.line,lat:p1[0]+(p2[0]-p1[0])*frac,lng:p1[1]+(p2[1]-p1[1])*frac,
            heading:fahrtwinkel(p1,p2),
            von:PORTS[stops[0][0]],bis:PORTS[stops[stops.length-1][0]],
            status:"zwischen "+PORTS[stops[s][0]]+" und "+PORTS[stops[s+1][0]]});
          break;
        }
      }
    }
  }
  return out;
}

    '<svg viewBox="'+(karteView?karteView.x.toFixed(1)+" "+karteView.y.toFixed(1)+" "+karteView.w.toFixed(1)+" "+karteView.h.toFixed(1):"0 0 "+KARTE_BASIS.w+" "+KARTE_BASIS.h)+'" preserveAspectRatio="xMidYMid meet">'+seeBg+lines+dots+boote+mein+'</svg>'+
    '<button type="button" class="lg-map-fs" id="lg-map-fs" title="'+(karteVollbild?t("krt_vollbild_verlassen"):t("krt_vollbild_anzeigen"))+'">'+(karteVollbild?"&#10005;":"&#9974;")+'</button>'+
    '<button type="button" class="lg-map-locate" id="lg-map-locate" title="'+t("krt_standort_title")+'">📍</button>'+
    '<div class="lg-map-info'+(infoSel?" is-sel":"")+'">'+infoTxt+'</div>'+
    '</div>'+
    '<p class="lg-map-hint">'+t("krt_hint_html")+'</p>'+
    '<p class="lg-map-stand" id="lg-karte-stand"></p>';
  h2+='</section>';
  return h2;
}

var karteTimer=null;
function karteStandText(){
  var el=document.getElementById("lg-karte-stand");
  if(!el) return;
  var n=new Date();
  el.textContent=tf("krt_stand_html",{time:pad2(n.getHours())+":"+pad2(n.getMinutes())});
}
var KARTE_MIN_W=45; // groesster Zoom (kleinster Ausschnitt)
function karteKlemmen(v){
  var aspect=v.w/v.h; // aktuelles Seitenverhaeltnis (= Container-Seitenverhaeltnis) beibehalten
  v.w=Math.max(KARTE_MIN_W,Math.min(KARTE_BASIS.w,v.w));
  v.h=v.w/aspect;
  if(v.h>KARTE_BASIS.h){ v.h=KARTE_BASIS.h; v.w=v.h*aspect; }
  if(v.x<0)v.x=0; if(v.y<0)v.y=0;
  if(v.x>KARTE_BASIS.w-v.w)v.x=Math.max(0,KARTE_BASIS.w-v.w);
  if(v.y>KARTE_BASIS.h-v.h)v.y=Math.max(0,KARTE_BASIS.h-v.h);
  return v;
}
function karteBindMap(){
  var svg=document.querySelector(".lg-map-wrap svg");
  if(!svg) return;
  if(!karteView){
    // Erstmalige Groesse: an das tatsaechliche Seitenverhaeltnis des Kartenbereichs anpassen,
    // damit "meet" den Container randlos fuellt (kein unsichtbarer Zuschnitt wie bei "slice").
    var rect=svg.getBoundingClientRect();
    var aspect=(rect.width>0&&rect.height>0)?rect.width/rect.height:(KARTE_BASIS.w/KARTE_BASIS.h);
    var h=KARTE_BASIS.h*0.62, w=h*aspect;
    if(w>KARTE_BASIS.w){ w=KARTE_BASIS.w; h=w/aspect; }
    if(w<KARTE_MIN_W){ w=KARTE_MIN_W; h=w/aspect; }
    var b=karteBounds();
    var mid=karteXY((b.latMin+b.latMax)/2,(b.lngMin+b.lngMax)/2);
    karteView=karteKlemmen({x:mid[0]-w/2,y:mid[1]-h/2,w:w,h:h});
    svg.setAttribute("viewBox",karteView.x.toFixed(1)+" "+karteView.y.toFixed(1)+" "+karteView.w.toFixed(1)+" "+karteView.h.toFixed(1));
  }
  var fsBtn=document.getElementById("lg-map-fs");
  if(fsBtn) fsBtn.addEventListener("click",function(){
    karteVollbild=!karteVollbild;
    karteView=null; // Kartenausschnitt neu an die geaenderte Groesse anpassen
    document.body.style.overflow=karteVollbild?"hidden":"";
    render();
  });
  var locateBtn=document.getElementById("lg-map-locate");
  if(locateBtn) locateBtn.addEventListener("click",function(){
    if(!navigator.geolocation){karteLocStatus=t("krt_loc_unsupported");render();return;}
    karteLocStatus=t("krt_loc_ermittelt");render();
    navigator.geolocation.getCurrentPosition(function(pos){
      karteMyPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      var nn=nearestPort(karteMyPos.lat,karteMyPos.lng);
      if(nn.far){
        karteLocStatus=t("krt_loc_far");
      }else{
        karteLocStatus=null;
        var mp=karteXY(karteMyPos.lat,karteMyPos.lng);
        var curAspect=karteView.w/karteView.h;
        var w=170,h=w/curAspect;
        karteView=karteKlemmen({x:mp[0]-w/2,y:mp[1]-h/2,w:w,h:h});
      }
      render();
    },function(){
      karteLocStatus=t("krt_loc_unavailable");
      render();
    },{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
  });
  function svgPunkt(clientX,clientY){
    var rect=svg.getBoundingClientRect();
    return {x:karteView.x+(clientX-rect.left)/rect.width*karteView.w,
      y:karteView.y+(clientY-rect.top)/rect.height*karteView.h};
  }
  function anwenden(){
    svg.setAttribute("viewBox",karteView.x.toFixed(1)+" "+karteView.y.toFixed(1)+" "+karteView.w.toFixed(1)+" "+karteView.h.toFixed(1));
  }
  var pts={},downPt=null,downView=null,dragged=false,downTime=0,pinchDist=0,pinchView=null,pinchMid=null;
  svg.addEventListener("pointerdown",function(e){
    svg.setPointerCapture(e.pointerId);
    pts[e.pointerId]={x:e.clientX,y:e.clientY};
    var ids=Object.keys(pts);
    if(ids.length===1){
      downPt={x:e.clientX,y:e.clientY}; downView={x:karteView.x,y:karteView.y,w:karteView.w,h:karteView.h};
      dragged=false; downTime=Date.now();
    }else if(ids.length===2){
      dragged=true; // waehrend eines Pinch-Gestus nie als Tipp werten
      var p1=pts[ids[0]],p2=pts[ids[1]];
      pinchDist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      pinchView={x:karteView.x,y:karteView.y,w:karteView.w,h:karteView.h};
      pinchMid=svgPunkt((p1.x+p2.x)/2,(p1.y+p2.y)/2);
    }
  });
  svg.addEventListener("pointermove",function(e){
    if(!pts[e.pointerId]) return;
    pts[e.pointerId]={x:e.clientX,y:e.clientY};
    var ids=Object.keys(pts);
    if(ids.length===1&&downPt){
      var rect=svg.getBoundingClientRect();
      var dxC=e.clientX-downPt.x, dyC=e.clientY-downPt.y;
      if(Math.hypot(dxC,dyC)>4) dragged=true;
      var dx=dxC/rect.width*downView.w, dy=dyC/rect.height*downView.h;
      karteView=karteKlemmen({x:downView.x-dx,y:downView.y-dy,w:downView.w,h:downView.h});
      anwenden();
      e.preventDefault();
    }else if(ids.length===2&&pinchDist>0){
      var p1=pts[ids[0]],p2=pts[ids[1]];
      var dist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      var factor=pinchDist/Math.max(dist,1);
      var pinchAspect=pinchView.w/pinchView.h;
      var newW=pinchView.w*factor, newH=newW/pinchAspect;
      var nx=pinchMid.x-(pinchMid.x-pinchView.x)*(newW/pinchView.w);
      var ny=pinchMid.y-(pinchMid.y-pinchView.y)*(newH/pinchView.h);
      karteView=karteKlemmen({x:nx,y:ny,w:newW,h:newH});
      anwenden();
      e.preventDefault();
    }
  });
  function karteUp(e){
    var warEinzeln=Object.keys(pts).length===1;
    delete pts[e.pointerId];
    var rest=Object.keys(pts).length;
    if(rest<2) pinchDist=0;
    if(rest===1){
      var nurId=Object.keys(pts)[0];
      downPt={x:pts[nurId].x,y:pts[nurId].y};
      downView={x:karteView.x,y:karteView.y,w:karteView.w,h:karteView.h};
      dragged=true; downTime=Date.now();
    }
    if(rest===0&&warEinzeln){
      if(downPt&&!dragged&&Date.now()-downTime<600){
        var el=document.elementFromPoint(e.clientX,e.clientY);
        var g=el&&el.closest?el.closest("[data-schiffidx]"):null;
        if(g){
          var idx=+g.getAttribute("data-schiffidx");
          state.schiffSel=(state.schiffSel===idx)?null:idx;
          render();
        }
      }
      downPt=null;
    }
  }
  svg.addEventListener("pointerup",karteUp);
  svg.addEventListener("pointercancel",karteUp);
  svg.addEventListener("wheel",function(e){
    e.preventDefault();
    var mid=svgPunkt(e.clientX,e.clientY);
    var factor=e.deltaY>0?1.15:1/1.15;
    var wheelAspect=karteView.w/karteView.h;
    var newW=karteView.w*factor, newH=newW/wheelAspect;
    var nx=mid.x-(mid.x-karteView.x)*(newW/karteView.w);
    var ny=mid.y-(mid.y-karteView.y)*(newH/karteView.h);
    karteView=karteKlemmen({x:nx,y:ny,w:newW,h:newH});
    anwenden();
  },{passive:false});
}
function render(){
  var main=document.getElementById("lg-main");
  if(karteTimer){ clearInterval(karteTimer); karteTimer=null; }
  if(state.tab!=="karte"){ karteView=null; if(karteVollbild){ karteVollbild=false; document.body.style.overflow=""; } } // Zoom/Pan/Vollbild beim Verlassen des Tabs zuruecksetzen
  if(state.tab==="planer") main.innerHTML=planerHTML();
  else if(state.tab==="schweiz") main.innerHTML=schweizHTML();
  else if(state.tab==="karte"){
    main.innerHTML=karteHTML();
    karteStandText();
    karteTimer=setInterval(function(){
      if(state.tab!=="karte") return;
      main.innerHTML=karteHTML();
      karteStandText();
      bind();
    },60000);
  }
  else main.innerHTML=hinweiseHTML();
  bind();
}

function bind(){
  // Schweiz-Reiter: Ziel-Chips und Datum
  document.querySelectorAll("[data-sdest]").forEach(function(b){
    b.addEventListener("click",function(){
      state.schweizDest=+this.getAttribute("data-sdest");render();
    });
  });
  var szwDate=document.getElementById("lg-szwdate");
  if(szwDate) szwDate.addEventListener("change",function(){if(this.value){state.date=this.value;render();}});
  var szwDateNext=document.getElementById("lg-szwdatenext");
  if(szwDateNext) szwDateNext.addEventListener("click",function(){
    var d=new Date(state.date+"T12:00:00");d.setDate(d.getDate()+1);
    var iso=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    if(iso>SAISON_MAX)iso=SAISON_MAX;
    state.date=iso;render();
  });
  var szwRet=document.getElementById("lg-szwretdate");
  if(szwRet) szwRet.addEventListener("change",function(){if(this.value){state.schweizRet=this.value;render();}});
  var szwRetNext=document.getElementById("lg-szwretdatenext");
  if(szwRetNext) szwRetNext.addEventListener("click",function(){
    var base=state.schweizRet||state.date;
    var d=new Date(base+"T12:00:00");d.setDate(d.getDate()+1);
    var iso=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    if(iso>SAISON_MAX)iso=SAISON_MAX;
    state.schweizRet=iso;render();
  });

  if(state.tab==="karte"){
    karteBindMap();
    return;
  }
  if(state.tab!=="planer") return;
  var date=document.getElementById("lg-date");
  date.addEventListener("change",function(){if(this.value){state.date=this.value;state.open=null;render();}});
  document.querySelectorAll("[data-picker-open]").forEach(function(b){
    b.addEventListener("click",function(){state.picker=this.getAttribute("data-picker-open");render();});
  });
  var pBackdrop=document.getElementById("lg-picker-backdrop");
  if(pBackdrop){
    pBackdrop.addEventListener("click",function(){state.picker=null;render();});
    var pPanel=document.getElementById("lg-picker-panel");
    if(pPanel) pPanel.addEventListener("click",function(e){e.stopPropagation();});
    var pClose=document.getElementById("lg-picker-close");
    if(pClose) pClose.addEventListener("click",function(){state.picker=null;render();});
    document.querySelectorAll("[data-port]").forEach(function(b){
      b.addEventListener("click",function(){
        var idx=+this.getAttribute("data-port");
        if(state.picker==="from") state.from=idx; else if(state.picker==="to") state.to=idx;
        state.picker=null;state.open=null;render();
      });
    });
  }
  var dayNext=document.getElementById("lg-daynext");
  if(dayNext) dayNext.addEventListener("click",function(){
    var d=new Date(state.date+"T12:00:00");d.setDate(d.getDate()+1);
    var iso=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
    if(iso>SAISON_MAX)iso=SAISON_MAX;
    state.date=iso;state.open=null;render();
  });
  document.getElementById("lg-swap").addEventListener("click",function(){var tmp=state.from;state.from=state.to;state.to=tmp;state.open=null;render();});
  var rows=document.querySelectorAll("[data-row]");
  rows.forEach(function(r){r.addEventListener("click",function(){var n=+this.getAttribute("data-row");state.open=(state.open===n?null:n);render();});});
}

document.querySelectorAll(".lg-tabs button").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".lg-tabs button").forEach(function(b){b.classList.remove("is-active");});
    this.classList.add("is-active");
    state.tab=this.getAttribute("data-tab");state.open=null;state.picker=null;render();
  });
});

// Übergabe von außen (Startseite/Deeplink): ?lat=..&lng=.. oder ?from=Wasserburg&to=Bregenz
(function(){
  try{
    var q=new URLSearchParams(location.search);
    var lat=parseFloat(q.get("lat")),lng=parseFloat(q.get("lng"));
    if(!isNaN(lat)&&!isNaN(lng)){
      var n=nearestPort(lat,lng);
      if(!n.far){state.from=n.idx;}
      else{state.locStatus=t("pl_loc_uebergeben_far");}
    }else{
      var fp=resolvePort(q.get("from"));if(fp>=0)state.from=fp;
    }
    var tp=resolvePort(q.get("to"));if(tp>=0)state.to=tp;
    if(q.get("tab")==="karte") state.tab="karte";
  }catch(e){}
})();
document.querySelectorAll(".lg-tabs button").forEach(function(b){
  b.classList.toggle("is-active", b.getAttribute("data-tab")===state.tab);
});
// Direkteinstieg über die Karte-Kachel der Startseite: eigener Titel,
// keine Tab-Leiste (die drei verbliebenen Tabs gehören zum Fahrplan-
// Planer, nicht zur Karte).
if(state.tab==="karte"){
  document.title=t("krt_doc_title");
  document.getElementById("lg-h1").innerHTML=esc(t("krt_h1_plain"))+'<span class="hl">'+esc(t("krt_h1_hl"))+'</span>';
  document.getElementById("lg-headsub").textContent=t("krt_sub");
  document.getElementById("lg-tabs").style.display="none";
}

function zurueckLotse(){ if(history.length>1){ history.back(); } else { location.href='index.html'; } }

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"&&karteVollbild){
    karteVollbild=false;
    karteView=null;
    document.body.style.overflow="";
    render();
  }
});

render();
</script>

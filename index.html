<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bootsmann">
<meta name="theme-color" content="#0E3553">
<link rel="apple-touch-icon" sizes="180x180" href="bootsmann-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="bootsmann-icon-192.png">
<link rel="manifest" href="bootsmann.webmanifest">
<title>Bootsmann · Bodensee</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap">
<script src="i18n.js"></script>
<script src="fahrplan-daten.js"></script>
<script src="katamaran-daten.js"></script>
<style>
:root{--ink:#0A2233;--navy:#103A5A;--blue:#15679E;--azure:#2BA6C9;--red:#C8472F;--sky:#EAF2F8;--paper:#F4F8FB;--line:#D8E5EF;--muted:#5C7488;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper);padding-bottom:26px;}
a{color:inherit;}

.lg-head{position:relative;background:linear-gradient(160deg,#0E3553 0%,#15679E 100%);color:#fff;padding:24px 22px 46px;overflow:hidden;}
.lg-head-inner{position:relative;z-index:2;}
.lg-head-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}
.lg-head-left{display:flex;align-items:center;gap:12px;}
.lg-logo{width:44px;height:44px;flex:none;}
.lg-logo svg{display:block;width:44px;height:44px;}
.lg-hotel{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:20px;color:#fff;line-height:1.05;}
.lg-head h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:32px;line-height:1.04;margin:2px 0 0;}
.lg-head h1 .hl{color:#62D0E8;}
.lg-lang{display:flex;gap:6px;flex:none;}
.lg-lang button{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;padding:5px 7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.lg-lang button .flag{font-size:16px;line-height:1;}
.lg-lang button .code{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;color:#D5E6F1;}
.lg-lang button.is-on{background:#fff;border-color:#fff;}
.lg-lang button.is-on .code{color:var(--navy);}
.lg-wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:42px;z-index:1;fill:var(--paper);}

.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--navy);margin:22px 16px 10px;letter-spacing:.01em;}
.tiles-stack{display:flex;flex-direction:column;gap:10px;padding:0 16px;}
.tile-row{background:#E7F2FA;border:1.5px solid #B7D6EB;border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:.15s;font:inherit;text-align:left;width:100%;}
.tile-row:active{background:#DCEBF6;border-color:#9FC7E2;}
.tile-row .ic{width:40px;height:40px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:11px;background:var(--blue);box-shadow:0 3px 8px rgba(21,103,158,.32);}
.tile-row .ic svg{width:23px;height:23px;stroke:#fff;}
.tile-row b{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;color:var(--navy);letter-spacing:.01em;flex:1;}
.tile-row .tile-row-text{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.tile-row .tile-row-text b{flex:none;}
.tile-row .tile-row-text small{font-size:13px;font-weight:500;color:var(--muted);}
.tile-row .chev{color:var(--azure);font-size:22px;flex:none;line-height:1;}

.card{background:#fff;border:1px solid var(--line);border-radius:16px;margin:16px;padding:14px;box-shadow:0 1px 3px rgba(16,58,90,.06);}
.lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 10px;}

.ruf-note{margin:16px;font-size:15px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;line-height:1.45;box-shadow:0 1px 3px rgba(16,58,90,.06);}

.foot{font-size:15px;color:var(--muted);text-align:center;padding:8px 22px 0;}
</style>
</head>
<body>
<div class="app">
  <header class="lg-head">
    <div class="lg-head-inner">
      <div class="lg-head-top">
        <div class="lg-head-left">
          <span class="lg-logo">
            <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0E3553"/><stop offset="1" stop-color="#15679E"/></linearGradient><clipPath id="bc"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath></defs><rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bm)"/><g transform="translate(256 268) scale(1.12) translate(-256 -268)"><rect x="252" y="166" width="8" height="42" rx="4" fill="#fff"/><path d="M260 170 h 34 l -12 12 l 12 12 h -34 Z" fill="#C8472F"/><rect x="216" y="204" width="80" height="30" rx="8" fill="#fff"/><rect x="182" y="232" width="148" height="56" rx="10" fill="#fff"/><circle cx="212" cy="260" r="11" fill="#0E3553"/><circle cx="256" cy="260" r="11" fill="#0E3553"/><circle cx="300" cy="260" r="11" fill="#0E3553"/><path d="M150 300 H 362 L 330 356 Q 320 366 304 366 H 208 Q 192 366 182 356 Z" fill="#fff"/><rect x="150" y="286" width="212" height="16" rx="6" fill="#62D0E8"/></g><g clip-path="url(#bc)"><path d="M-30 346 q 95 -30 190 0 t 190 0 t 190 0 L 560 540 L -30 540 Z" fill="#1B6EA0"/><path d="M-30 372 q 100 -28 200 0 t 200 0 t 200 0 L 570 540 L -30 540 Z" fill="#2BA6C9"/></g></svg>
          </span>
          <div class="lg-hotel">Bootsmann</div>
        </div>
        <div id="lg-lang-slot"></div>
      </div>
      <h1><span data-i18n="h1_prefix">Willkommen am</span> <span class="hl" data-i18n="h1_lake">Bodensee</span></h1>
    </div>
    <svg class="lg-wave" viewBox="0 0 1440 42" preserveAspectRatio="none"><path d="M0 42V20c120-16 260-16 380 0s260 16 380 0 260-16 380 0 200 12 300 6v16z"/></svg>
  </header>

  <p class="section-title" data-i18n="womit_fahren">Womit wollen Sie fahren?</p>
  <div class="tiles-stack">
    <button class="tile-row" onclick="openPage('bsb-fahrplan.html')">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#15679E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13h16l-1.6 4.4a2 2 0 0 1-1.9 1.3H7.5a2 2 0 0 1-1.9-1.3L4 13z"/><path d="M6 13V8a1 1 0 0 1 1-1h7l3 6"/><path d="M10 7V4h3"/><path d="M3 21c1.2-1 2-1 3.2 0 1.2 1 2 1 3.2 0 1.2-1 2-1 3.2 0 1.2 1 2 1 3.2 0"/></svg></span>
      <span class="tile-row-text">
        <b data-i18n="tile_bsb">BSB Schifffahrt</b>
        <small data-i18n="tile_bsb_sub">Überlinger See / Untersee / Schweiz</small>
      </span>
      <span class="chev">&rsaquo;</span>
    </button>
    <button class="tile-row" onclick="openPage('autofaehre.html')">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#15679E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15h18l-1.3 3.4a1.5 1.5 0 0 1-1.4 1H5.7a1.5 1.5 0 0 1-1.4-1L3 15z"/><path d="M6 12h12"/><path d="M7.5 12l1.3-2.6A1.3 1.3 0 0 1 10 8.6h4a1.3 1.3 0 0 1 1.2.8L16.5 12"/></svg></span>
      <span class="tile-row-text">
        <b data-i18n="tile_faehre">Bodensee Fähre</b>
        <small data-i18n="tile_faehre_sub">Pendelverkehr Konstanz – Meersburg</small>
      </span>
      <span class="chev">&rsaquo;</span>
    </button>
    <button class="tile-row" onclick="openPage('katamaran.html')">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#15679E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17h4l1-3h8l1 3h4"/><path d="M9 14V9a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v5"/><path d="M13 3l3 3M17 3l3 3"/></svg></span>
      <span class="tile-row-text">
        <b data-i18n="tile_kat_home">Schnellschiff-Katamaran</b>
        <small data-i18n="tile_kat_home_sub">Pendelverkehr Friedrichshafen – Konstanz</small>
      </span>
      <span class="chev">&rsaquo;</span>
    </button>
  </div>

  <div class="ruf-note" data-i18n="ruf_hint">Verfügbare Rückfahrten werden direkt bei den Hinfahrt-Zeiten angezeigt.</div>

  <p class="section-title" data-i18n="informationen_lbl">Informationen</p>
  <div class="tiles-stack">
    <button class="tile-row" onclick="routeZumHafen()">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#15679E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-12a7 7 0 0 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg></span>
      <b data-i18n="tile_route_hafen">Route zum nächstgelegenen Hafen</b>
      <span class="chev">&rsaquo;</span>
    </button>
    <button class="tile-row" onclick="openPage('bsb-fahrplan.html','tab=karte')">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#15679E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg></span>
      <b data-i18n="tile_karte">Live-Positionskarte</b>
      <span class="chev">&rsaquo;</span>
    </button>
    <button class="tile-row" onclick="openPage('bsb-fahrplan.html','tab=hinweise')">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#15679E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.7" r="1" fill="#15679E" stroke="none"/></svg></span>
      <b data-i18n="tile_hinweise">Hinweise</b>
      <span class="chev">&rsaquo;</span>
    </button>
  </div>

  <div class="card">
    <p class="lbl" data-i18n="rechtliches_lbl">Rechtliches</p>
    <details>
      <summary style="cursor:pointer;font-weight:600;color:var(--navy)" data-i18n="impressum_h">Impressum</summary>
      <div style="margin-top:8px;font-size:15px;color:var(--muted);line-height:1.6" data-i18n-html="impressum_html"></div>
    </details>
    <details style="margin-top:12px">
      <summary style="cursor:pointer;font-weight:600;color:var(--navy)" data-i18n="datenschutz_h">Datenschutzerklärung</summary>
      <div style="margin-top:8px;font-size:15px;color:var(--muted);line-height:1.6" data-i18n-html="datenschutz_html"></div>
    </details>
    <details style="margin-top:12px">
      <summary style="cursor:pointer;font-weight:600;color:var(--navy)" data-i18n="haftung_h">Haftungsausschluss</summary>
      <div style="margin-top:8px;font-size:15px;color:var(--muted);line-height:1.6" data-i18n-html="haftung_html"></div>
    </details>
    <details style="margin-top:12px">
      <summary style="cursor:pointer;font-weight:600;color:var(--navy)" data-i18n="urheber_h">Urheberrecht</summary>
      <div style="margin-top:8px;font-size:15px;color:var(--muted);line-height:1.6" data-i18n-html="urheber_html"></div>
    </details>
  </div>

  <p class="foot" data-i18n="footer_disclaimer">Angaben ohne Gewähr</p>
</div>

<script>
"use strict";
document.getElementById("lg-lang-slot").innerHTML=i18nSwitcherHTML();
i18nApplyStatic();
i18nInitSwitcher();
var GEO={lat:null,lng:null};
function openPage(f,extra){
  var params=[];
  if(extra) params.push(extra);
  if(GEO.lat!=null){ params.push('lat='+GEO.lat); params.push('lng='+GEO.lng); }
  location.href = f + (params.length? '?'+params.join('&') : '');
}
var GEO_FALLBACK={lat:47.598,lng:9.547}; // Langenargen, falls kein Standort verfügbar
function startGeo(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(p){
      GEO.lat=p.coords.latitude; GEO.lng=p.coords.longitude;
    },function(){},{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
  }
}
startGeo();

/* Kachel "Route zum nächstgelegenen Hafen": nutzt den bereits ermittelten
   Standort (GEO, per startGeo() oben angefragt) bzw. den Fallback-Hafen,
   und öffnet direkt die Google-Maps-Route (nutzt fahrplan-daten.js). */
var LANGENARGEN_IDX=6; // Fallback-Hafen, falls Standort zu weit vom See entfernt ist
function routeZumHafen(){
  var lat=GEO.lat!=null?GEO.lat:GEO_FALLBACK.lat;
  var lng=GEO.lat!=null?GEO.lng:GEO_FALLBACK.lng;
  var n=nearestPort(lat,lng);
  var hafenIdx=n.far?LANGENARGEN_IDX:n.idx;
  var url="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent("Schiffsanlegestelle "+PORTS[hafenIdx]+" Bodensee")+"&travelmode=walking";
  window.open(url,"_blank","noopener");
}
</script>
<script>
if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js'); }); }
</script>
</body>
</html>

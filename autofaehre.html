<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0E3553">
<title>Autofähre Konstanz – Meersburg</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap">
<script src="i18n.js"></script>
<style>
:root{--ink:#0A2233;--navy:#103A5A;--blue:#15679E;--azure:#2BA6C9;--red:#C8472F;--sky:#EAF2F8;--paper:#F4F8FB;--line:#D8E5EF;--muted:#5C7488;--gold:#B9842B;
  --ampel-gruen:#2E9E5B;--ampel-gelb:#E0A020;--ampel-rot:#D9453D;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5;-webkit-font-smoothing:antialiased;}
.lg-app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper);}
select,input,button{font-family:inherit;}

.lg-head{position:relative;background:linear-gradient(160deg,#0E3553 0%,#15679E 100%);color:#fff;padding:26px 22px 42px;overflow:hidden;}
.lg-head-inner{position:relative;z-index:2;}
.lg-head-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
.lg-back{display:inline-flex;align-items:center;gap:6px;color:#0A2233;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;background:#7FD5EA;border:1.5px solid #62D0E8;border-radius:999px;padding:9px 16px;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.lg-back:active{background:#62D0E8;border-color:#2BA6C9;}
.lg-head h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;line-height:1.04;margin:6px 0 0;letter-spacing:.01em;}
.lg-head h1 .hl{color:#62D0E8;}
.lg-sub{margin:8px 0 0;font-size:14px;color:#D5E6F1;}
.lg-lang{display:flex;gap:6px;flex:none;}
.lg-lang button{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;padding:5px 7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.lg-lang button .flag{font-size:16px;line-height:1;}
.lg-lang button .code{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.04em;color:#D5E6F1;}
.lg-lang button.is-on{background:#fff;border-color:#fff;}
.lg-lang button.is-on .code{color:var(--navy);}
.lg-wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:44px;z-index:1;fill:var(--paper);}

.wrap{padding:16px;}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 1px 3px rgba(16,58,90,.06);margin-bottom:14px;}
.lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 8px;}

.dir{display:flex;gap:8px;}
.dir button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;color:var(--ink);line-height:1.2;}
.dir button b{display:block;font-size:17px;font-weight:600;}
.dir button small{display:block;font-size:12px;color:var(--muted);margin-top:2px;}
.dir button.is-active{border-color:var(--azure);background:#EAF7FB;box-shadow:inset 0 0 0 1px var(--azure);}

.when{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.when .fld{flex:1;min-width:120px;}
.when .fld span{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
.when input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;color:var(--ink);background:#fff;}

.deps{list-style:none;margin:0;padding:0;}
.dep{display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);}
.dep:last-child{border-bottom:none;}
.dep .t{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:22px;color:var(--navy);min-width:74px;}
.dep .meta{font-size:15px;color:var(--muted);flex:1;}
.dep .in{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:.03em;text-transform:uppercase;color:#fff;background:var(--azure);border-radius:999px;padding:4px 11px;white-space:nowrap;}
.dep.soon .t{color:var(--blue);}
.dephead{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:12px;font-weight:600;color:var(--muted);padding:6px 6px 2px;}

.notice{background:#FFF7E9;border:1px solid #F0D9A8;border-radius:12px;padding:13px 14px;font-size:15px;color:#6b4e18;}
.notice-info{background:#EAF2F8;border:1px solid #D8E5EF;border-radius:12px;padding:13px 14px;font-size:15px;color:#103A5A;}
.notice-alert{background:#FBECEC;border:1px solid #F2BEBB;border-radius:12px;padding:13px 14px;font-size:15px;color:#772622;}
.notice-ok{background:#EAF5EF;border:1px solid #B6DDC6;border-radius:12px;padding:13px 14px;font-size:15px;color:#195732;}
.lg-ampel{display:flex;align-items:center;gap:14px;}
.lg-ampel-lamp{flex:none;display:flex;flex-direction:column;gap:6px;background:#20242B;border-radius:10px;padding:7px 6px;}
.lg-ampel-dot{width:16px;height:16px;border-radius:50%;background:#454B54;}
.lg-ampel-dot--red.is-on{background:var(--ampel-rot);box-shadow:0 0 9px 2px rgba(217,69,61,.8);}
.lg-ampel-dot--yellow.is-on{background:var(--ampel-gelb);box-shadow:0 0 9px 2px rgba(224,160,32,.8);}
.lg-ampel-dot--green.is-on{background:var(--ampel-gruen);box-shadow:0 0 9px 2px rgba(46,158,91,.8);}
.lg-ampel-text{flex:1;}
#ruf:not(:empty){margin-bottom:14px;}
.foot{font-size:15px;color:var(--muted);padding:2px 6px 26px;}
.foot .disclaimer{text-align:center;}
.foot a{color:var(--blue);}
.foot .ext{display:flex;gap:8px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin:10px 0;color:var(--ink);text-decoration:none;}
.foot .ext b{color:var(--blue);}
</style>
</head>
<body>
<div class="lg-app">
  <header class="lg-head">
    <div class="lg-head-inner">
      <div class="lg-head-top">
        <button class="lg-back" onclick="zurueck()" data-i18n="back_btn">‹ Zurück</button>
        <div id="lg-lang-slot"></div>
      </div>
      <h1><span data-i18n="faehre_h1_plain">Bodensee</span> <span class="hl" data-i18n="faehre_h1_hl">Fähre</span></h1>
      <p class="lg-sub" data-i18n="faehre_season">Saison 2026 · 27. Mär – 4. Okt</p>
    </div>
    <svg class="lg-wave" viewBox="0 0 1440 44" preserveAspectRatio="none"><path d="M0 44V20c120-16 260-16 380 0s260 16 380 0 260-16 380 0 200 12 300 6v18z"/></svg>
  </header>

  <div class="wrap">
    <div class="card">
      <p class="lbl" data-i18n="richtung_lbl">Richtung</p>
      <div class="dir" id="dir">
        <button data-dir="konstanz" onclick="setDir('konstanz')"><b><span data-i18n="ab_prefix">ab </span>Konstanz</b><small>Staad</small></button>
        <button data-dir="meersburg" onclick="setDir('meersburg')"><b><span data-i18n="ab_prefix">ab </span>Meersburg</b><small>Fährhafen</small></button>
      </div>
    </div>

    <div class="card">
      <p class="lbl" data-i18n="ab_wann_lbl">Ab wann?</p>
      <div class="when">
        <label class="fld"><span data-i18n="datum_lbl">Datum</span><input type="date" id="date"></label>
        <label class="fld"><span data-i18n="uhrzeit_lbl">Uhrzeit</span><input type="time" id="time"></label>
      </div>
    </div>

    <div class="card" id="result"></div>
    <div id="ruf"></div>

    <div class="foot">
      <a class="ext" href="https://www.stadtwerke-konstanz.de/faehre/fahrplan/" target="_blank" rel="noopener">
        <span>🔗</span><span data-i18n-html="faehre_ext_html">Störungen, Ausfälle und der Sonderfahrplan werden nur auf der <b>offiziellen Seite der Stadtwerke Konstanz</b> angezeigt. Dort gelten deren Regeln – nicht die von Bootsmann.</span>
      </a>
      <p class="disclaimer" data-i18n="footer_disclaimer">Angaben ohne Gewähr</p>
      <details style="margin-top:10px">
        <summary style="cursor:pointer;font-weight:600;color:var(--blue)" data-i18n="impressum_datenschutz_h">Impressum &amp; Datenschutz</summary>
        <div style="margin-top:8px" data-i18n-html="faehre_impressum_html"></div>
      </details>
    </div>
  </div>
</div>

<script>
"use strict";
var I18N_TITLE_KEY="faehre_doc_title";
document.getElementById("lg-lang-slot").innerHTML=i18nSwitcherHTML();
i18nApplyStatic();
i18nInitSwitcher();

/* ---- Fahrplan Hauptsaison 27.3.–4.10.2026 (Aushang Stadtwerke Konstanz) ---- */
/* Pro Richtung, pro Tagtyp: w = Mo–Fr, we = Sa/So + Feiertag. Stunde -> Abfahrtsminuten. */
var PLAN = {
  konstanz:{
    w:{0:[5],1:[5],2:[5],3:[5],4:[5],5:[5,35,50],6:[5,20,35,50],7:[5,20,35,50],8:[5,20,35,50],9:[5,20,30,45,55],10:[10,20,35,45],11:[0,10,25,35,50],12:[0,15,25,40,50],13:[5,15,30,40,55],14:[5,20,30,45,55],15:[10,20,35,45],16:[0,10,25,35,50],17:[0,15,25,40,50],18:[5,15,30,40,55],19:[5,20,35,50],20:[5,35],21:[5,35],22:[5],23:[5]},
    we:{0:[5],1:[5],2:[5],3:[5],4:[5],5:[5],6:[5],7:[5,35],8:[5,35,50],9:[5,30,45,55],10:[10,20,35,45],11:[0,10,25,35,50],12:[0,15,25,40,50],13:[5,15,30,40,55],14:[5,20,30,45,55],15:[10,20,35,45],16:[0,10,25,35,50],17:[0,15,25,40,50],18:[5,15,30,40,55],19:[5,35,50],20:[5,35],21:[5,35],22:[5],23:[5]}
  },
  meersburg:{
    w:{0:[35],1:[35],2:[35],3:[35],4:[35],5:[35],6:[5,20,35,50],7:[5,20,35,50],8:[5,20,35,50],9:[5,20,30,45,55],10:[10,20,35,45],11:[0,10,25,35,50],12:[0,15,25,40,50],13:[5,15,30,40,55],14:[5,20,30,45,55],15:[10,20,35,45],16:[0,10,25,35,50],17:[0,15,25,40,50],18:[5,15,30,40,55],19:[5,20,35,50],20:[5,20,35],21:[5,35],22:[5,35],23:[35]},
    we:{0:[35],1:[35],2:[35],3:[35],4:[35],5:[35],6:[35],7:[35],8:[5,35],9:[5,20,30,55],10:[10,20,35,45],11:[0,10,25,35,50],12:[0,15,25,40,50],13:[5,15,30,40,50],14:[5,20,30,45,55],15:[10,20,35,45],16:[0,10,25,35,50],17:[0,15,25,40,50],18:[5,15,30,40,55],19:[5,20,35],20:[5,20,35],21:[5,35],22:[5,35],23:[35]}
  }
};

var SEASON_START="2026-03-27", SEASON_END="2026-10-04";
/* Feiertage Baden-Württemberg 2026 -> Sa/So-Fahrplan */
var FEIERTAGE={"2026-01-01":1,"2026-01-06":1,"2026-04-03":1,"2026-04-06":1,"2026-05-01":1,"2026-05-14":1,"2026-05-25":1,"2026-06-04":1,"2026-10-03":1,"2026-11-01":1,"2026-12-25":1,"2026-12-26":1};

var PORTS={konstanz:{lat:47.6870,lng:9.1960},meersburg:{lat:47.6940,lng:9.2710}};
var STATE={dir:"konstanz",date:"",time:""};

function pad(n){return (n<10?"0":"")+n;}
function iso(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function hhmm(d){return pad(d.getHours())+":"+pad(d.getMinutes());}

function daytype(d){
  var day=d.getDay();
  if(day===0||day===6) return "we";
  if(FEIERTAGE[iso(d)]) return "we";
  return "w";
}
function distKm(a,b){
  var R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  var s=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

function collect(dir,baseDate,fromMin,n){
  var res=[],h,m,mins,plan,dt;
  dt=daytype(baseDate); plan=PLAN[dir][dt];
  for(h=0;h<24;h++){ mins=plan[h]||[]; for(m=0;m<mins.length;m++){ if(h*60+mins[m]>=fromMin) res.push({h:h,m:mins[m],off:0}); } }
  if(res.length<n){
    var nd=new Date(baseDate.getTime()); nd.setDate(nd.getDate()+1);
    var nds=iso(nd);
    if(nds>=SEASON_START && nds<=SEASON_END){
      dt=daytype(nd); plan=PLAN[dir][dt];
      for(h=0;h<24 && res.length<n+2;h++){ mins=plan[h]||[]; for(m=0;m<mins.length;m++){ res.push({h:h,m:mins[m],off:1}); } }
    }
  }
  return res.slice(0,n);
}

/* Letzte Abfahrt einer Richtung an einem bestimmten Kalendertag (kein Tage-Rollover). */
function letzteAmTag(dir,baseDate){
  var list=collect(dir,baseDate,0,300).filter(function(x){return x.off===0;});
  return list.length ? list[list.length-1] : null;
}
// Rueckfahrt-Ampel: kleines Drei-Lampen-Symbol (Rot/Gelb/Gruen) links neben dem
// Text, zusaetzlich zur Hintergrundfarbe der Box (gleiches Symbol wie bsb-fahrplan.html).
function ampelBoxHTML(cls,contentHtml){
  var isAlert=cls==="notice-alert",isOk=cls==="notice-ok";
  var h='<div class="'+cls+' lg-ampel"><span class="lg-ampel-lamp">';
  h+='<span class="lg-ampel-dot lg-ampel-dot--red'+(isAlert?" is-on":"")+'"></span>';
  h+='<span class="lg-ampel-dot lg-ampel-dot--yellow"></span>';
  h+='<span class="lg-ampel-dot lg-ampel-dot--green'+(isOk?" is-on":"")+'"></span>';
  h+='</span><span class="lg-ampel-text">'+contentHtml+'</span></div>';
  return h;
}
function rueckfahrtHTML(){
  if(STATE.date<SEASON_START || STATE.date>SEASON_END) return "";
  var base=new Date(STATE.date+"T00:00:00");
  var revDir = STATE.dir==="konstanz" ? "meersburg" : "konstanz";
  var vonName = revDir==="konstanz" ? "Konstanz" : "Meersburg";
  var nachName = STATE.dir==="konstanz" ? "Konstanz" : "Meersburg";
  var istHeute = STATE.date===iso(new Date());
  var WD=t("weekdays");
  var dateLabel=WD[base.getDay()]+", "+base.getDate()+"."+(base.getMonth()+1)+".";
  var letzte=letzteAmTag(revDir,base);
  if(!letzte){
    return '<div class="notice-info">'+tf(istHeute?"ruf_keine_heute_html":"ruf_keine_am_html",{date:dateLabel,to:vonName,from:nachName})+'</div>';
  }
  var dep=new Date(base.getTime()); dep.setHours(letzte.h,letzte.m,0,0);
  if(istHeute && dep.getTime()<Date.now()){
    return ampelBoxHTML("notice-alert",tf("ruf_vorbei_html",{to:vonName,time:pad(letzte.h)+":"+pad(letzte.m)}));
  }
  return ampelBoxHTML("notice-ok",tf(istHeute?"ruf2_info_heute_html":"ruf2_info_am_html",{date:dateLabel,to:vonName,time:pad(letzte.h)+":"+pad(letzte.m)}));
}

function render(){
  var box=document.getElementById("result");
  document.querySelectorAll("#dir button").forEach(function(b){ b.classList.toggle("is-active", b.getAttribute("data-dir")===STATE.dir); });
  document.getElementById("ruf").innerHTML=rueckfahrtHTML();

  if(STATE.date<SEASON_START || STATE.date>SEASON_END){
    box.innerHTML='<div class="notice">'+t("faehre_notice_offseason_html")+'</div>';
    return;
  }

  var base=new Date(STATE.date+"T00:00:00");
  var fromMin=parseInt(STATE.time.slice(0,2),10)*60+parseInt(STATE.time.slice(3,5),10);
  if(isNaN(fromMin)) fromMin=0;
  var list=collect(STATE.dir,base,fromMin,7);
  var now=new Date();

  if(!list.length){ box.innerHTML='<div class="notice">'+t("notice_empty_day")+'</div>'; return; }

  var ziel = t("nach_prefix") + (STATE.dir==="konstanz" ? "Meersburg" : "Konstanz");
  var html='<div class="dephead">'+t("abfahrten_prefix")+ziel+'</div><ul class="deps">';
  for(var i=0;i<list.length;i++){
    var it=list[i];
    var dep=new Date(base.getTime()); dep.setDate(dep.getDate()+it.off); dep.setHours(it.h,it.m,0,0);
    var delta=Math.round((dep.getTime()-now.getTime())/60000);
    var soon = delta>=0 && delta<=90;
    var meta = it.off? t("morgen") : "";
    var inTxt = soon ? '<span class="in">'+(delta<=0?t("jetzt_lbl"):t("in_min_prefix")+delta+t("min_unit"))+'</span>' : '';
    html+='<li class="dep'+(soon?' soon':'')+'"><span class="t">'+pad(it.h)+':'+pad(it.m)+'</span><span class="meta">'+meta+'</span>'+inTxt+'</li>';
  }
  html+='</ul>';
  box.innerHTML=html;
}

function setDir(d){ STATE.dir=d; render(); }
function refreshNow(){
  var n=new Date();
  STATE.date=iso(n); STATE.time=hhmm(n);
  document.getElementById("date").value=STATE.date;
  document.getElementById("time").value=STATE.time;
  render();
}
function zurueck(){ location.href="./"; }

(function init(){
  var p=new URLSearchParams(location.search);
  var lat=parseFloat(p.get("lat")), lng=parseFloat(p.get("lng"));
  if(!isNaN(lat)&&!isNaN(lng)){
    var here={lat:lat,lng:lng};
    STATE.dir = distKm(here,PORTS.meersburg) < distKm(here,PORTS.konstanz) ? "meersburg" : "konstanz";
  }
  document.getElementById("date").addEventListener("change",function(e){ STATE.date=e.target.value||STATE.date; render(); });
  document.getElementById("time").addEventListener("change",function(e){ STATE.time=e.target.value||STATE.time; render(); });
  refreshNow();
})();

// Beim Zurückkehren in den Vordergrund wieder auf "jetzt" setzen
document.addEventListener("visibilitychange",function(){ if(!document.hidden) refreshNow(); });
window.addEventListener("pageshow",function(){ refreshNow(); });
</script>
</body>
</html>
